name: Firebase Hosting

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

permissions:
  checks: write
  contents: read
  id-token: write
  pull-requests: write

jobs:
  build_and_deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/282468806996/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: github-firebase-hosting@propfynia-app.iam.gserviceaccount.com

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Deploy preview channel
        if: github.event_name == 'pull_request'
        run: firebase hosting:channel:deploy pr-${{ github.event.pull_request.number }} --project propfynia-app --expires 7d

      - name: Deploy live site
        if: github.event_name == 'push'
        run: firebase deploy --only hosting --project propfynia-app
